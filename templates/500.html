<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="text-center">
            <div class="text-9xl font-bold text-red-600 mb-4">500</div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Internal Server Error</h1>
            <p class="text-gray-600 mb-8">Something went wrong on our end. Please try again later.</p>
            <a href="/" class="inline-flex items-center bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                <i class="fas fa-home mr-2"></i>
                Go Back Home
            </a>
        </div>
    </div>
</body>
</html>
